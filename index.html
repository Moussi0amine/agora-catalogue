<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGORA Chaussures — Catalogue</title>
<link rel="icon" href="logo-agora.jpg" type="image/jpeg">
<link rel="apple-touch-icon" href="logo-agora.jpg">
<meta name="description" content="Catalogue officiel AGORA Chaussures — Homme, Femme, Enfant">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #181818;
  --border: #222;
  --red: #d42b2b;
  --text: #f0f0ee;
  --text-dim: #666;
  --text-mid: #999;
}

html { scroll-behavior: smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); font-size:14px; overflow-x:hidden; }

/* ── HEADER ────────────────────────────────────── */
header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,10,0.97); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px; height:64px;
}
.logo img { height:42px; width:auto; object-fit:contain; }
.header-tagline {
  font-size:11px; color:var(--text-dim); letter-spacing:0.12em;
  text-transform:uppercase;
}
.lang-switcher { display:flex; gap:6px; }
.lang-btn {
  padding:4px 10px; border-radius:4px; font-size:11px; font-weight:600;
  background:transparent; border:1px solid var(--border); color:var(--text-dim);
  cursor:pointer; transition:all 0.12s; letter-spacing:0.05em;
}
.lang-btn.active { border-color:var(--red); color:var(--red); background:rgba(212,43,43,0.08); }

/* Nav tabs */
.header-nav {
  display:flex; align-items:center; gap:0;
  padding:0 32px; border-top:1px solid var(--border);
  overflow-x:auto;
}
.nav-tab {
  padding:12px 20px; font-size:13px; font-weight:500;
  color:var(--text-dim); cursor:pointer; transition:all 0.12s;
  border-bottom:2px solid transparent; white-space:nowrap;
  background:none; border-top:none; border-left:none; border-right:none;
  font-family:inherit;
}
.nav-tab:hover { color:var(--text); }
.nav-tab.active { color:var(--text); border-bottom-color:var(--red); }

/* ── HERO ────────────────────────────────────────────── */
.hero {
  padding:72px 32px 56px;
  text-align:center;
  position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:600px; height:300px;
  background:radial-gradient(ellipse at 50% 0%, rgba(212,43,43,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.hero-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--red);
  margin-bottom:16px;
}
.hero-title {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(56px,8vw,96px);
  letter-spacing:0.04em; line-height:0.92;
  margin-bottom:12px;
}
.hero-title .accent { color:var(--red); }
.hero-sub {
  font-size:14px; color:var(--text-mid); font-weight:300;
  margin-top:8px; letter-spacing:0.02em;
}

/* ── SEARCH BAR ─────────────────────────────────────── */
.search-bar-wrap { padding:0 32px 32px; max-width:600px; margin:0 auto; }
.search-bar {
  width:100%; padding:12px 18px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:inherit; font-size:14px;
  transition:border-color 0.15s;
}
.search-bar:focus { outline:none; border-color:#444; }
.search-bar::placeholder { color:var(--text-dim); }

/* ── SECTION ─────────────────────────────────────────── */
.section { padding:0 32px 56px; }
.section-header {
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:24px; padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.section-title {
  font-family:'Bebas Neue',cursive;
  font-size:36px; letter-spacing:0.06em;
}
.section-title .dot { color:var(--red); }
.section-count { font-size:12px; color:var(--text-dim); }

/* sub-section (garçon / fille) */
.sub-section { margin-bottom:36px; }
.sub-label {
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.12em; color:var(--text-dim); margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.sub-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── GRID ───────────────────────────────────────────── */
.products-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:22px;
}

.pcard {
  background:linear-gradient(180deg, #141414 0%, #101010 100%);
  border:1px solid #242424;
  border-radius:14px; overflow:hidden;
  transition:border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  cursor:pointer;
}
.pcard:hover {
  border-color:#3f3f3f;
  transform:translateY(-4px);
  box-shadow:0 14px 28px rgba(0,0,0,0.38);
}

.pcard-img-wrap {
  width:100%; height:280px; background:var(--surface2);
  overflow:hidden; position:relative;
}
.pcard-img-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform 0.4s;
}
.pcard:hover .pcard-img-wrap img { transform:scale(1.05); }
.pcard-no-img {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-dim); font-size:13px; flex-direction:column; gap:8px;
}
.pcard-no-img span { font-size:32px; }


.pcard-body { padding:16px 16px 14px; }
.pcard-cat {
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--red); margin-bottom:6px;
}
.pcard-name { font-size:16px; font-weight:500; line-height:1.35; margin-bottom:5px; }
.pcard-ref { font-size:12px; color:var(--text-dim); font-family:'DM Mono',monospace; }
.pcard-sizes { font-size:12px; color:var(--text-dim); margin-top:7px; }

/* ── EMPTY ───────────────────────────────────────────── */
.empty { text-align:center; padding:80px 20px; color:var(--text-dim); }
.empty .big { font-size:48px; margin-bottom:16px; }

/* ── FOOTER ─────────────────────────────────────────── */
footer {
  border-top:1px solid var(--border); padding:32px;
  text-align:center; color:var(--text-dim); font-size:12px;
}
.footer-logo { font-family:'Bebas Neue',cursive; font-size:24px; color:var(--text); margin-bottom:6px; }
.footer-logo span { color:var(--red); }

/* ── MODAL ───────────────────────────────────────────── */
.modal-bg {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(6px);
  align-items:center; justify-content:center; padding:20px;
}
.modal-bg.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid #333;
  border-radius:14px; width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto; position:relative;
}
.modal-close {
  position:absolute; top:14px; right:14px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text-mid); font-size:16px;
  width:32px; height:32px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { color:var(--text); }
.modal-imgs { display:flex; overflow-x:auto; gap:0; }
.modal-imgs img {
  width:100%; min-width:100%; height:300px; object-fit:cover; flex-shrink:0;
}
.modal-info { padding:22px; }
.modal-cat { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--red); margin-bottom:6px; }
.modal-name { font-size:22px; font-weight:500; margin-bottom:4px; }
.modal-ref { font-size:12px; color:var(--text-dim); font-family:'DM Mono',monospace; margin-bottom:14px; }
.modal-desc { font-size:13px; color:var(--text-mid); line-height:1.7; margin-bottom:14px; }
.modal-sizes-wrap { margin-bottom:10px; }
.modal-sizes-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-dim); margin-bottom:8px; }
.modal-sizes { display:flex; flex-wrap:wrap; gap:6px; }
.msize { padding:5px 12px; border:1px solid var(--border); border-radius:5px; font-size:12px; font-weight:500; }

/* Responsive */
@media(max-width:600px){
  .header-top { padding:0 16px; }
  .header-nav { padding:0 16px; }
  .hero { padding:40px 16px 32px; }
  .section { padding:0 16px 40px; }
  .search-bar-wrap { padding:0 16px 20px; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo"><img src="logo-agora.jpg" alt="AGORA Chaussures"></div>
    <div class="header-tagline" id="tagline">Catalogue Officiel</div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('ar')">AR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-tab active" onclick="setTab('all')" id="tab-all" data-fr="Tous" data-ar="الكل" data-en="All">Tous</button>
    <button class="nav-tab" onclick="setTab('homme')" id="tab-homme" data-fr="Homme" data-ar="رجال" data-en="Men">Homme</button>
    <button class="nav-tab" onclick="setTab('femme')" id="tab-femme" data-fr="Femme" data-ar="نساء" data-en="Women">Femme</button>
    <button class="nav-tab" onclick="setTab('enfant')" id="tab-enfant" data-fr="Enfant" data-ar="أطفال" data-en="Children">Enfant</button>
  </nav>
</header>

<section class="hero">
  <div class="hero-eyebrow" id="heroEyebrow">Collection 2025</div>
  <h1 class="hero-title">AGORA<br><span class="accent">Chaussures</span></h1>
  <p class="hero-sub" id="heroSub">Qualité & Style — جودة وأناقة — Quality & Style</p>
</section>

<div class="search-bar-wrap">
  <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Rechercher un modèle..." oninput="renderAll()">
</div>

<div id="mainContent"></div>

<footer>
  <div class="footer-logo">AGORA <span>Chaussures</span></div>
  <p id="footerText">© 2025 Group Agora Chaussures — Tous droits réservés</p>
</footer>

<!-- PRODUCT MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-imgs" id="modalImgs"></div>
    <div class="modal-info">
      <div class="modal-cat" id="mCat"></div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-ref" id="mRef"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-sizes-wrap" id="mSizesWrap">
        <div class="modal-sizes-label" id="mSizesLabel">Pointures disponibles</div>
        <div class="modal-sizes" id="mSizes"></div>
      </div>
    </div>
  </div>
</div>

<script>
let products = [];
let currentTab = 'all';
let currentLang = 'fr';

const LABELS = {
  fr: {
    tagline:'Catalogue Officiel', all:'Tous', homme:'Homme', femme:'Femme', enfant:'Enfant',
    garcon:'Garçon', fille:'Fille', sizes:'Pointures disponibles',
    noImg:'Aucune image', search:'🔍 Rechercher un modèle...',
    footer:'© 2025 Group Agora Chaussures — Tous droits réservés',
    empty:'Aucun produit trouvé.',
    catLabel:{ homme:'Homme', femme:'Femme', enfant:'Enfant' },
  },
  ar: {
    tagline:'الكتالوج الرسمي', all:'الكل', homme:'رجال', femme:'نساء', enfant:'أطفال',
    garcon:'أولاد', fille:'بنات', sizes:'المقاسات المتاحة',
    noImg:'لا توجد صورة', search:'🔍 ابحث عن منتج...',
    footer:'© 2025 مجموعة أغورا للأحذية — جميع الحقوق محفوظة',
    empty:'لا توجد منتجات.',
    catLabel:{ homme:'رجال', femme:'نساء', enfant:'أطفال' },
  },
  en: {
    tagline:'Official Catalogue', all:'All', homme:'Men', femme:'Women', enfant:'Children',
    garcon:'Boy', fille:'Girl', sizes:'Available sizes',
    noImg:'No image', search:'🔍 Search for a model...',
    footer:'© 2025 Group Agora Chaussures — All rights reserved',
    empty:'No products found.',
    catLabel:{ homme:'Men', femme:'Women', enfant:'Children' },
  }
};

function L(key) { return LABELS[currentLang][key] || key; }

// ── Load products ──────────────────────────────────────
async function loadProducts() {
  try {
    const res = await fetch('catalogue.json?v=' + Date.now());
    if(!res.ok) throw new Error();
    const data = await res.json();
    products = data.products || [];
  } catch(e) {
    products = [];
  }
  renderAll();
}

// ── Render ──────────────────────────────────────────────
function renderAll() {
  const query = (document.getElementById('searchBar').value || '').toLowerCase().trim();
  let list = [...products];
  if(currentTab !== 'all') list = list.filter(p=>p.category===currentTab);
  if(query) list = list.filter(p=>(p.name||'').toLowerCase().includes(query)||(p.ref||'').toLowerCase().includes(query));

  const content = document.getElementById('mainContent');

  if(!list.length) {
    content.innerHTML = `<div class="empty"><div class="big">👟</div><p>${L('empty')}</p></div>`;
    return;
  }

  if(currentTab === 'all') {
    // Render each category as a section
    const cats = ['homme','femme','enfant'];
    let html = '';
    cats.forEach(cat => {
      const catList = list.filter(p=>p.category===cat);
      if(!catList.length) return;

      if(cat === 'enfant') {
        const garcons = catList.filter(p=>p.subCategory==='garcon');
        const filles  = catList.filter(p=>p.subCategory==='fille');
        const autres  = catList.filter(p=>!p.subCategory);
        html += `<section class="section">
          <div class="section-header">
            <span class="section-title">${L('enfant')}<span class="dot">.</span></span>
            <span class="section-count">${catList.length} article(s)</span>
          </div>`;
        if(garcons.length) html += `<div class="sub-section"><div class="sub-label">👦 ${L('garcon')}</div><div class="products-grid">${garcons.map(cardHTML).join('')}</div></div>`;
        if(filles.length)  html += `<div class="sub-section"><div class="sub-label">👧 ${L('fille')}</div><div class="products-grid">${filles.map(cardHTML).join('')}</div></div>`;
        if(autres.length)  html += `<div class="products-grid">${autres.map(cardHTML).join('')}</div>`;
        html += `</section>`;
      } else {
        html += `<section class="section">
          <div class="section-header">
            <span class="section-title">${L(cat)}<span class="dot">.</span></span>
            <span class="section-count">${catList.length} article(s)</span>
          </div>
          <div class="products-grid">${catList.map(cardHTML).join('')}</div>
        </section>`;
      }
    });
    content.innerHTML = html;
  } else if(currentTab === 'enfant') {
    const garcons = list.filter(p=>p.subCategory==='garcon');
    const filles  = list.filter(p=>p.subCategory==='fille');
    const autres  = list.filter(p=>!p.subCategory);
    let html = `<section class="section">
      <div class="section-header">
        <span class="section-title">${L('enfant')}<span class="dot">.</span></span>
        <span class="section-count">${list.length} article(s)</span>
      </div>`;
    if(garcons.length) html += `<div class="sub-section"><div class="sub-label">👦 ${L('garcon')}</div><div class="products-grid">${garcons.map(cardHTML).join('')}</div></div>`;
    if(filles.length)  html += `<div class="sub-section"><div class="sub-label">👧 ${L('fille')}</div><div class="products-grid">${filles.map(cardHTML).join('')}</div></div>`;
    if(autres.length)  html += `<div class="products-grid">${autres.map(cardHTML).join('')}</div>`;
    html += `</section>`;
    content.innerHTML = html;
  } else {
    content.innerHTML = `<section class="section">
      <div class="section-header">
        <span class="section-title">${L(currentTab)}<span class="dot">.</span></span>
        <span class="section-count">${list.length} article(s)</span>
      </div>
      <div class="products-grid">${list.map(cardHTML).join('')}</div>
    </section>`;
  }
}

function productTitle(p) {
  return (p.name && p.name.trim()) || '';
}

function cardHTML(p) {
  const title = productTitle(p);
  const ref = (p.ref && p.ref.trim()) || '';
  const altText = title || ref || 'Produit';
  const imgContent = p.images && p.images.length
    ? `<img src="${p.images[0]}" alt="${altText}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=pcard-no-img><span>👟</span><span>${L('noImg')}</span></div>'">`
    : `<div class="pcard-no-img"><span>👟</span><span>${L('noImg')}</span></div>`;
  const catLabel = L('catLabel')[p.category] || p.category;
  const subLabel = p.subCategory ? ` · ${L(p.subCategory)}` : '';
  const refLine = ref ? `<div class="pcard-ref">REF: ${ref}</div>` : '';
  return `
  <div class="pcard" onclick="openModal('${p.id}')">
    <div class="pcard-img-wrap">
      ${imgContent}
    </div>
    <div class="pcard-body">
      <div class="pcard-cat">${catLabel}${subLabel}</div>
      ${title ? `<div class="pcard-name">${title}</div>` : ''}
      ${refLine}
      ${p.sizes && p.sizes.length ? `<div class="pcard-sizes">📏 ${p.sizes.join(' · ')}</div>` : ''}
    </div>
  </div>`;
}

// ── Modal ────────────────────────────────────────────────
function openModal(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const catLabel = L('catLabel')[p.category] || p.category;
  const subLabel = p.subCategory ? ` · ${L(p.subCategory)}` : '';
  document.getElementById('mCat').textContent   = catLabel + subLabel;
  const title = productTitle(p);
  const mName = document.getElementById('mName');
  mName.textContent = title;
  mName.style.display = title ? '' : 'none';
  document.getElementById('mRef').textContent   = p.ref ? 'REF: ' + p.ref : '';
  const mDesc = document.getElementById('mDesc');
  mDesc.textContent  = p.description || '';
  mDesc.style.display = p.description ? '' : 'none';
  document.getElementById('mSizesLabel').textContent = L('sizes');
  document.getElementById('mSizes').innerHTML   = (p.sizes||[]).map(s=>`<span class="msize">${s}</span>`).join('');
  document.getElementById('mSizesWrap').style.display = p.sizes&&p.sizes.length ? '' : 'none';

  const imgs = document.getElementById('modalImgs');
  imgs.innerHTML = (p.images && p.images.length)
    ? p.images.map(u=>`<img src="${u}" alt="${title || p.ref || 'Produit'}">`).join('')
    : '';

  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) { if(e.target===document.getElementById('modalBg')) closeModalBtn(); }
function closeModalBtn() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalBtn(); });

// ── Language ─────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.getElementById('tagline').textContent = L('tagline');
  document.getElementById('searchBar').placeholder = L('search');
  document.getElementById('footerText').textContent = L('footer');
  document.querySelectorAll('.nav-tab').forEach(t => {
    const key = t.id.replace('tab-','');
    if(LABELS[lang][key]) t.textContent = L(key);
  });
  renderAll();
}

// ── Tab ──────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderAll();
}

loadProducts();
</script>
</body>
</html>
