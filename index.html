<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGORA Chaussures — Catalogue</title>
<link rel="icon" href="logo-agora.jpg" type="image/jpeg">
<link rel="apple-touch-icon" href="logo-agora.jpg">
<meta name="description" content="Catalogue officiel AGORA Chaussures — Homme, Femme, Enfant">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #181818;
  --border: #222;
  --red: #d42b2b;
  --red-soft: rgba(212,43,43,0.14);
  --text: #f0f0ee;
  --text-dim: #666;
  --text-mid: #999;
  --header-bg: rgba(10,10,10,0.97);
  --hero-fade: rgba(10,10,10,0.9);
  --card-bg: linear-gradient(180deg, #141414 0%, #101010 100%);
  --card-border: #242424;
  --card-hover-border: #3f3f3f;
  --modal-bg: linear-gradient(180deg,#171717,#121212);
  --modal-border: #383838;
  --search-bg: rgba(24,24,24,0.78);
  --search-border: #2a2a2a;
  --msize-bg: rgba(255,255,255,0.02);
  --msize-border: #3a3a3a;
  --shadow: rgba(0,0,0,0.38);
  --modal-shadow: rgba(0,0,0,0.48);
}

[data-theme="light"] {
  --bg: #f5f4f1;
  --surface: #ffffff;
  --surface2: #ececea;
  --border: #e0deda;
  --red: #c0231c;
  --red-soft: rgba(192,35,28,0.10);
  --text: #111110;
  --text-dim: #888;
  --text-mid: #555;
  --header-bg: rgba(245,244,241,0.97);
  --hero-fade: rgba(245,244,241,0.9);
  --card-bg: linear-gradient(180deg, #ffffff 0%, #f7f6f3 100%);
  --card-border: #e4e2de;
  --card-hover-border: #c8c4be;
  --modal-bg: linear-gradient(180deg,#ffffff,#f7f6f3);
  --modal-border: #ddd;
  --search-bg: rgba(255,255,255,0.9);
  --search-border: #d8d5d0;
  --msize-bg: rgba(0,0,0,0.03);
  --msize-border: #ddd;
  --shadow: rgba(0,0,0,0.10);
  --modal-shadow: rgba(0,0,0,0.18);
}

html { scroll-behavior: smooth; }
body {
  font-family:'DM Sans',sans-serif;
  background:
    radial-gradient(850px 420px at 50% -120px, rgba(212,43,43,0.12), transparent 70%),
    var(--bg);
  color:var(--text); font-size:14px; overflow-x:hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── HEADER ────────────────────────────────────── */
header {
  position:sticky; top:0; z-index:100;
  background:var(--header-bg); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px; height:64px;
}
.logo img { height:42px; width:auto; object-fit:contain; }
.header-tagline {
  font-size:11px; color:var(--text-dim); letter-spacing:0.12em;
  text-transform:uppercase;
}
.theme-btn {
  background:transparent;
  border:1px solid var(--border);
  border-radius:6px;
  width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px;
  transition:border-color 0.18s, background 0.18s;
  flex-shrink:0;
}
.theme-btn:hover { border-color:var(--text-mid); background:var(--surface2); }
.lang-switcher { display:flex; gap:6px; }
.lang-btn {
  padding:4px 10px; border-radius:4px; font-size:11px; font-weight:600;
  background:transparent; border:1px solid var(--border); color:var(--text-dim);
  cursor:pointer; transition:all 0.18s; letter-spacing:0.05em;
}
.lang-btn:hover { border-color:var(--text-mid); color:var(--text); }
.lang-btn.active { border-color:var(--red); color:var(--red); background:var(--red-soft); }

/* Nav tabs */
.header-nav {
  display:flex; align-items:center; gap:0;
  padding:0 32px; border-top:1px solid var(--border);
  overflow-x:auto;
}
.nav-tab {
  padding:12px 20px; font-size:13px; font-weight:500;
  color:var(--text-dim); cursor:pointer; transition:all 0.12s;
  border-bottom:2px solid transparent; white-space:nowrap;
  background:none; border-top:none; border-left:none; border-right:none;
  font-family:inherit;
}
.nav-tab:hover { color:var(--text); }
.nav-tab.active { color:var(--text); border-bottom-color:var(--red); text-shadow:0 0 18px rgba(212,43,43,0.35); }

/* ── HERO ────────────────────────────────────────────── */
.hero {
  padding:72px 32px 56px;
  text-align:center;
  position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:600px; height:300px;
  background:radial-gradient(ellipse at 50% 0%, rgba(212,43,43,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.hero::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, transparent 40%, var(--hero-fade) 100%);
  pointer-events:none;
}
.hero-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--red);
  margin-bottom:16px;
}
.hero-title {
  font-family:'Bebas Neue',cursive;
  font-size:clamp(56px,8vw,96px);
  letter-spacing:0.04em; line-height:0.92;
  margin-bottom:12px;
}
.hero-title .accent { color:var(--red); }
.hero-sub {
  font-size:14px; color:var(--text-mid); font-weight:300;
  margin-top:8px; letter-spacing:0.02em;
}

/* ── SEARCH BAR ─────────────────────────────────────── */
.search-bar-wrap { padding:0 32px 32px; max-width:600px; margin:0 auto; }
.search-bar {
  width:100%; padding:13px 18px;
  background:var(--search-bg); border:1px solid var(--search-border);
  border-radius:12px; color:var(--text); font-family:inherit; font-size:14px;
  transition:border-color 0.18s, box-shadow 0.18s, background 0.3s;
  backdrop-filter:blur(8px);
}
.search-bar:focus {
  outline:none; border-color:rgba(212,43,43,0.55);
  box-shadow:0 0 0 3px rgba(212,43,43,0.12);
}
.search-bar::placeholder { color:var(--text-dim); }

/* ── SECTION ─────────────────────────────────────────── */
.section { padding:0 32px 56px; }
.section-header {
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:24px; padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.section-title {
  font-family:'Bebas Neue',cursive;
  font-size:36px; letter-spacing:0.06em;
}
.section-title .dot { color:var(--red); }
.section-count { font-size:12px; color:var(--text-dim); }

/* sub-section */
.sub-section { margin-bottom:36px; }
.sub-label {
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.12em; color:var(--text-dim); margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.sub-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── GRID ───────────────────────────────────────────── */
.products-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:22px;
}

.pcard {
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:14px; overflow:hidden;
  transition:border-color 0.2s, transform 0.2s, box-shadow 0.2s, background 0.3s;
  cursor:pointer;
  position:relative;
}
.pcard::before{
  content:'';
  position:absolute; inset:0 0 auto 0; height:2px;
  background:linear-gradient(90deg, transparent, rgba(212,43,43,0.9), transparent);
  opacity:0;
  transition:opacity 0.2s;
}
.pcard:hover {
  border-color:var(--card-hover-border);
  transform:translateY(-4px);
  box-shadow:0 14px 28px var(--shadow);
}
.pcard:hover::before{ opacity:1; }

.pcard-img-wrap {
  width:100%; height:280px; background:var(--surface2);
  overflow:hidden; position:relative;
  transition: background 0.3s;
}
.pcard-img-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform 0.4s;
}
.pcard:hover .pcard-img-wrap img { transform:scale(1.05); }
.pcard-no-img {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-dim); font-size:13px; flex-direction:column; gap:8px;
}
.pcard-no-img span { font-size:32px; }

.pcard-body { padding:16px 16px 14px; }
.pcard-cat {
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--red); margin-bottom:6px;
}
.pcard-name { font-size:16px; font-weight:500; line-height:1.35; margin-bottom:5px; color:var(--text); }
.pcard-ref { font-size:12px; color:var(--text-dim); font-family:'DM Mono',monospace; }
.pcard-sizes { font-size:12px; color:var(--text-dim); margin-top:7px; }

/* ── EMPTY ───────────────────────────────────────────── */
.empty { text-align:center; padding:80px 20px; color:var(--text-dim); }
.empty .big { font-size:48px; margin-bottom:16px; }

/* ── FOOTER ─────────────────────────────────────────── */
footer {
  border-top:1px solid var(--border); padding:32px;
  text-align:center; color:var(--text-dim); font-size:12px;
  transition: border-color 0.3s;
}
.footer-logo { font-family:'Bebas Neue',cursive; font-size:24px; color:var(--text); margin-bottom:6px; }
.footer-logo span { color:var(--red); }

/* ── MODAL ───────────────────────────────────────────── */
.modal-bg {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.72); backdrop-filter:blur(6px);
  align-items:center; justify-content:center; padding:20px;
}
.modal-bg.open { display:flex; }
@keyframes modalIn {
  from { opacity:0; transform:scale(0.96) translateY(8px); }
  to   { opacity:1; transform:scale(1)    translateY(0);   }
}
.modal-bg.open .modal { animation: modalIn 0.22s ease; }
.modal {
  background:var(--modal-bg); border:1px solid var(--modal-border);
  border-radius:16px; width:100%; max-width:600px;
  max-height:90vh; overflow-y:auto; position:relative;
  box-shadow:0 28px 56px var(--modal-shadow);
  transition: background 0.3s, border-color 0.3s;
}
.modal-close {
  position:absolute; top:14px; right:14px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text-mid); font-size:16px;
  width:32px; height:32px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: background 0.3s, border-color 0.3s;
}
.modal-close:hover { color:var(--text); background:var(--surface); }
.modal-info { padding:24px; }
.modal-cat { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--red); margin-bottom:6px; }
.modal-name { font-size:22px; font-weight:500; margin-bottom:4px; color:var(--text); }
.modal-ref { font-size:12px; color:var(--text-dim); font-family:'DM Mono',monospace; margin-bottom:14px; }
.modal-desc { font-size:13px; color:var(--text-mid); line-height:1.7; margin-bottom:14px; }
.modal-sizes-wrap { margin-bottom:10px; }
.modal-sizes-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-dim); margin-bottom:8px; }
.modal-sizes { display:flex; flex-wrap:wrap; gap:6px; }
.msize {
  padding:6px 12px; border:1px solid var(--msize-border); border-radius:999px;
  font-size:12px; font-weight:500; color:var(--text);
  background:var(--msize-bg);
  transition: background 0.3s, border-color 0.3s;
}

/* Responsive */
@media(max-width:600px){
  .header-top { padding:0 16px; }
  .header-nav { padding:0 16px; }
  .hero { padding:40px 16px 32px; }
  .section { padding:0 16px 40px; }
  .search-bar-wrap { padding:0 16px 20px; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo"><img src="logo-agora.jpg" alt="AGORA Chaussures"></div>
    <div class="header-tagline" id="tagline">Catalogue Officiel</div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
      <span id="themeIcon">☀️</span>
    </button>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-tab active" onclick="setTab('all')" id="tab-all">Tous</button>
    <button class="nav-tab" onclick="setTab('homme')" id="tab-homme">Homme</button>
    <button class="nav-tab" onclick="setTab('femme')" id="tab-femme">Femme</button>
    <button class="nav-tab" onclick="setTab('enfant')" id="tab-enfant">Enfant</button>
  </nav>
</header>

<section class="hero">
  <div class="hero-eyebrow" id="heroEyebrow">Collection 2025</div>
  <h1 class="hero-title">AGORA<br><span class="accent">Chaussures</span></h1>
  <p class="hero-sub" id="heroSub">Qualité & Style — Quality & Style</p>
</section>

<div class="search-bar-wrap">
  <input type="text" class="search-bar" id="searchBar" placeholder="Rechercher un modèle..." oninput="renderAll()">
</div>

<div id="mainContent"></div>

<footer>
  <div class="footer-logo">AGORA <span>Chaussures</span></div>
  <p id="footerText">© 2025 Group Agora Chaussures — Tous droits réservés</p>
</footer>

<!-- PRODUCT MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-imgs" id="modalImgs"></div>
    <div class="modal-info">
      <div class="modal-cat" id="mCat"></div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-ref" id="mRef"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-sizes-wrap" id="mSizesWrap">
        <div class="modal-sizes-label" id="mSizesLabel">Pointures disponibles</div>
        <div class="modal-sizes" id="mSizes"></div>
      </div>
    </div>
  </div>
</div>

<script>
let products = [];
let currentTab = 'all';
let currentLang = 'fr';

const LABELS = {
  fr: {
    tagline:'Catalogue Officiel', all:'Tous', homme:'Homme', femme:'Femme', enfant:'Enfant',
    garcon:'Garçon', fille:'Fille', sizes:'Pointures disponibles',
    noImg:'Aucune image', search:'Rechercher un modèle...',
    footer:'© 2025 Group Agora Chaussures — Tous droits réservés',
    empty:'Aucun produit trouvé.',
    articles: n => `${n} article${n > 1 ? 's' : ''}`,
    catLabel:{ homme:'Homme', femme:'Femme', enfant:'Enfant' },
    heroSub:'Qualité & Style — Quality & Style',
  },
  en: {
    tagline:'Official Catalogue', all:'All', homme:'Men', femme:'Women', enfant:'Children',
    garcon:'Boy', fille:'Girl', sizes:'Available sizes',
    noImg:'No image', search:'Search for a model...',
    footer:'© 2025 Group Agora Chaussures — All rights reserved',
    empty:'No products found.',
    articles: n => `${n} item${n > 1 ? 's' : ''}`,
    catLabel:{ homme:'Men', femme:'Women', enfant:'Children' },
    heroSub:'Quality & Style',
  }
};

function L(key) { return LABELS[currentLang][key] || key; }

async function loadProducts() {
  try {
    const res = await fetch('catalogue.json?v=' + Date.now());
    if(!res.ok) throw new Error();
    const data = await res.json();
    products = data.products || [];
  } catch(e) { products = []; }
  renderAll();
}

function renderAll() {
  const query = (document.getElementById('searchBar').value || '').toLowerCase().trim();
  let list = [...products];
  if(currentTab !== 'all') list = list.filter(p=>p.category===currentTab);
  if(query) list = list.filter(p=>(p.name||'').toLowerCase().includes(query)||(p.ref||'').toLowerCase().includes(query));
  const content = document.getElementById('mainContent');
  if(!list.length) {
    content.innerHTML = `<div class="empty"><div class="big">👟</div><p>${L('empty')}</p></div>`;
    return;
  }
  if(currentTab === 'all') {
    const cats = ['homme','femme','enfant'];
    let html = '';
    cats.forEach(cat => {
      const catList = list.filter(p=>p.category===cat);
      if(!catList.length) return;
      if(cat === 'enfant') {
        const garcons = catList.filter(p=>p.subCategory==='garcon');
        const filles  = catList.filter(p=>p.subCategory==='fille');
        const autres  = catList.filter(p=>!p.subCategory);
        html += `<section class="section"><div class="section-header"><span class="section-title">${L('enfant')}<span class="dot">.</span></span><span class="section-count">${LABELS[currentLang].articles(catList.length)}</span></div>`;
        if(garcons.length) html += `<div class="sub-section"><div class="sub-label">${L('garcon')}</div><div class="products-grid">${garcons.map(cardHTML).join('')}</div></div>`;
        if(filles.length)  html += `<div class="sub-section"><div class="sub-label">${L('fille')}</div><div class="products-grid">${filles.map(cardHTML).join('')}</div></div>`;
        if(autres.length)  html += `<div class="products-grid">${autres.map(cardHTML).join('')}</div>`;
        html += `</section>`;
      } else {
        html += `<section class="section"><div class="section-header"><span class="section-title">${L(cat)}<span class="dot">.</span></span><span class="section-count">${LABELS[currentLang].articles(catList.length)}</span></div><div class="products-grid">${catList.map(cardHTML).join('')}</div></section>`;
      }
    });
    content.innerHTML = html;
  } else if(currentTab === 'enfant') {
    const garcons = list.filter(p=>p.subCategory==='garcon');
    const filles  = list.filter(p=>p.subCategory==='fille');
    const autres  = list.filter(p=>!p.subCategory);
    let html = `<section class="section"><div class="section-header"><span class="section-title">${L('enfant')}<span class="dot">.</span></span><span class="section-count">${LABELS[currentLang].articles(list.length)}</span></div>`;
    if(garcons.length) html += `<div class="sub-section"><div class="sub-label">${L('garcon')}</div><div class="products-grid">${garcons.map(cardHTML).join('')}</div></div>`;
    if(filles.length)  html += `<div class="sub-section"><div class="sub-label">${L('fille')}</div><div class="products-grid">${filles.map(cardHTML).join('')}</div></div>`;
    if(autres.length)  html += `<div class="products-grid">${autres.map(cardHTML).join('')}</div>`;
    html += `</section>`;
    content.innerHTML = html;
  } else {
    content.innerHTML = `<section class="section"><div class="section-header"><span class="section-title">${L(currentTab)}<span class="dot">.</span></span><span class="section-count">${LABELS[currentLang].articles(list.length)}</span></div><div class="products-grid">${list.map(cardHTML).join('')}</div></section>`;
  }
}

function productTitle(p) { return (p.name && p.name.trim()) || ''; }

function cardHTML(p) {
  const title = productTitle(p);
  const ref = (p.ref && p.ref.trim()) || '';
  const altText = title || ref || 'Produit';
  const imgContent = p.images && p.images.length
    ? `<img src="${p.images[0]}" alt="${altText}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=pcard-no-img><span>👟</span><span>${L('noImg')}</span></div>'">`
    : `<div class="pcard-no-img"><span>👟</span><span>${L('noImg')}</span></div>`;
  const catLabel = L('catLabel')[p.category] || p.category;
  const subLabel = p.subCategory ? ` · ${L(p.subCategory)}` : '';
  const refLine = ref ? `<div class="pcard-ref">REF: ${ref}</div>` : '';
  return `<div class="pcard" onclick="openModal('${p.id}')"><div class="pcard-img-wrap">${imgContent}</div><div class="pcard-body"><div class="pcard-cat">${catLabel}${subLabel}</div>${title ? `<div class="pcard-name">${title}</div>` : ''}${refLine}${p.sizes && p.sizes.length ? `<div class="pcard-sizes">📏 ${p.sizes.join(' · ')}</div>` : ''}</div></div>`;
}

function openModal(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const catLabel = L('catLabel')[p.category] || p.category;
  const subLabel = p.subCategory ? ` · ${L(p.subCategory)}` : '';
  document.getElementById('mCat').textContent = catLabel + subLabel;
  const title = productTitle(p);
  const mName = document.getElementById('mName');
  mName.textContent = title;
  mName.style.display = title ? '' : 'none';
  document.getElementById('mRef').textContent = p.ref ? 'REF: ' + p.ref : '';
  const mDesc = document.getElementById('mDesc');
  mDesc.textContent = p.description || '';
  mDesc.style.display = p.description ? '' : 'none';
  document.getElementById('mSizesLabel').textContent = L('sizes');
  document.getElementById('mSizes').innerHTML = (p.sizes||[]).map(s=>`<span class="msize">${s}</span>`).join('');
  document.getElementById('mSizesWrap').style.display = p.sizes&&p.sizes.length ? '' : 'none';

  let modalImgIdx = 0;
  function showModalImg(i) {
    modalImgIdx = i;
    const el = document.getElementById('mMainImg');
    if(el) el.src = p.images[i];
    document.querySelectorAll('.img-dot').forEach((d,j) => { d.style.opacity = j===i ? '1' : '0.3'; });
  }
  window.showModalImg = showModalImg;

  const dotColor = document.documentElement.getAttribute('data-theme') === 'light' ? '#111' : '#fff';
  const dots = p.images && p.images.length > 1
    ? `<div style="display:flex;gap:6px;justify-content:center;padding:8px 0 4px">` +
      p.images.map((_,i) => `<span class="img-dot" onclick="showModalImg(${i})" style="width:7px;height:7px;border-radius:50%;background:${dotColor};opacity:${i===0?1:0.3};cursor:pointer;transition:opacity 0.2s"></span>`).join('') +
      `</div>` : '';

  document.getElementById('modalImgs').innerHTML = p.images && p.images.length
    ? `<div style="position:relative"><img id="mMainImg" src="${p.images[0]}" alt="${title||p.ref||'Produit'}" style="width:100%;height:300px;object-fit:cover;display:block">${dots}</div>`
    : '';

  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) { if(e.target===document.getElementById('modalBg')) closeModalBtn(); }
function closeModalBtn() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalBtn(); });

function setLang(lang) {
  document.documentElement.dir = 'ltr';
  document.documentElement.lang = lang;
  currentLang = lang;
  const pageTitles = { fr:'AGORA Chaussures — Catalogue', en:'AGORA Shoes — Catalogue' };
  document.title = pageTitles[lang];
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.getElementById('tagline').textContent = L('tagline');
  document.getElementById('heroSub').textContent = L('heroSub');
  document.getElementById('searchBar').placeholder = L('search');
  document.getElementById('footerText').textContent = L('footer');
  document.querySelectorAll('.nav-tab').forEach(t => {
    const key = t.id.replace('tab-','');
    if(LABELS[lang][key]) t.textContent = L(key);
  });
  renderAll();
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderAll();
}

function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeIcon').textContent = next === 'light' ? '🌙' : '☀️';
  localStorage.setItem('agora-theme', next);
}

function initTheme() {
  const saved = localStorage.getItem('agora-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  if(theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeIcon').textContent = '🌙';
  }
}

initTheme();
loadProducts();
</script>
</body>
</html>
